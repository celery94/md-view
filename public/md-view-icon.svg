<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: cyan → mid-blue → deep navy -->
    <linearGradient id="bg" x1="32" y1="32" x2="480" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="52%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <!-- Soft top-left shine overlay -->
    <radialGradient id="shine" cx="30%" cy="15%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- M letterform: pure white top → light cyan bottom -->
    <linearGradient id="mFill" x1="76" y1="80" x2="436" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <!-- Eye lens: frost-white → icy cyan -->
    <linearGradient id="eyeLens" x1="318" y1="371" x2="462" y2="469" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0FDFA"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <!-- Drop shadow for M letterform -->
    <filter id="mShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#0C1B33" flood-opacity="0.30"/>
    </filter>
    <!-- Drop shadow for eye badge -->
    <filter id="eyeShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#0C1B33" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Gloss highlight -->
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <!-- Subtle inner border ring -->
  <rect x="3" y="3" width="506" height="506" rx="110" stroke="white" stroke-opacity="0.18" stroke-width="6" fill="none"/>

  <!-- Bold geometric M letterform -->
  <g filter="url(#mShadow)">
    <path d="M 76 80 L 151 80 L 256 250 L 361 80 L 436 80
             L 436 420 L 361 420 L 361 206 L 256 383
             L 151 206 L 151 420 L 76 420 Z"
          fill="url(#mFill)"/>
  </g>

  <!-- Preview eye badge – overlaps bottom-right corner of M -->
  <g filter="url(#eyeShadow)">
    <!-- Eye outer glow (depth shadow) -->
    <ellipse cx="390" cy="420" rx="72" ry="49" fill="#0F172A" fill-opacity="0.22"/>
    <!-- Eye whites -->
    <ellipse cx="390" cy="420" rx="72" ry="49" fill="url(#eyeLens)"/>
    <!-- Iris -->
    <circle cx="390" cy="420" r="27" fill="#0284C7"/>
    <!-- Pupil -->
    <circle cx="390" cy="420" r="13" fill="#075985"/>
    <!-- Primary catchlight -->
    <circle cx="404" cy="410" r="10" fill="white" fill-opacity="0.88"/>
    <!-- Secondary catchlight -->
    <circle cx="381" cy="428" r="4" fill="white" fill-opacity="0.42"/>
  </g>
</svg>
